# deployments/docker-compose.yml
version: "3.9"

services:
  # ───────────────── API GATEWAY ─────────────────
  api:
    build:
      context: ../
      dockerfile: deployments/docker/api.Dockerfile
    container_name: nexuslink-api
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      - APP_ENV=development
      - HTTP_PORT=8080
      - METRICS_PORT=9090
      - DATABASE_URL=postgres://nexus:nexus_secret@postgres:5432/nexuslink?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://nexus:nexus_secret@rabbitmq:5672/nexuslink
      - RATE_LIMIT_RPS=100
      - RATE_LIMIT_BURST=200
      - HASH_LENGTH=7
      - LOG_LEVEL=debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nexuslink-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ───────────────── ANALYTICS WORKERS ─────────────────
  worker:
    build:
      context: ../
      dockerfile: deployments/docker/worker.Dockerfile
    environment:
      - APP_ENV=development
      - DATABASE_URL=postgres://nexus:nexus_secret@postgres:5432/nexuslink?sslmode=disable
      - RABBITMQ_URL=amqp://nexus:nexus_secret@rabbitmq:5672/nexuslink
      - BATCH_SIZE=500
      - BATCH_TIMEOUT=5s
      - WORKER_CONCURRENCY=4
      - LOG_LEVEL=debug
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    deploy:
      replicas: 2
    restart: unless-stopped
    networks:
      - nexuslink-net

  # ───────────────── REDIS (Cache + Rate Limiter) ─────────────────
  redis:
    image: redis:7-alpine
    container_name: nexuslink-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --save 60 1000
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - nexuslink-net

  # ───────────────── RABBITMQ (Message Broker) ─────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: nexuslink-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=nexus
      - RABBITMQ_DEFAULT_PASS=nexus_secret
      - RABBITMQ_DEFAULT_VHOST=nexuslink
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - nexuslink-net

  # ───────────────── POSTGRESQL (Persistent Storage) ─────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nexuslink-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=nexus
      - POSTGRES_PASSWORD=nexus_secret
      - POSTGRES_DB=nexuslink
    volumes:
      - postgres-data:/var/lib/postgresql/data
    command: >
      postgres
      -c shared_buffers=128MB
      -c effective_cache_size=256MB
      -c work_mem=4MB
      -c max_connections=100
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexuslink"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - nexuslink-net

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:

networks:
  nexuslink-net:
    driver: bridge
